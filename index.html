<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iGang — Woolaway Shearing Co.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:inherit}
.hs{overflow-x:auto;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import{createElement as e,useState,useMemo}from'https://esm.sh/react@18';
import{createRoot}from'https://esm.sh/react-dom@18/client';

const N='#1a3a5c',ND='#0f2236',AM='#e8a020',GR='#6b7280',BD='#e5e7eb';
const BL='#1d4ed8',BLB='#dbeafe',CR='#d97706',CRB='#fef3c7';
const GN='#166534',GNB='#dcfce7',RD='#dc2626',RDB='#fee2e2';
const PIN='1234';
const DAYS=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const DS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DD=['23/3','24/3','25/3','26/3','27/3','28/3','29/3'];
const CLS=['Ewes','Wethers','Rams','Lambs','Other'];
const ROLES=['Wool Handler','Presser','Penner','Classer'];
const STATUS_OPTS=['active','completed','charged'];
const STATUS_LABELS={active:'Active',completed:'Completed',charged:'Charged Out'};
const STATUS_COLORS={active:[GNB,GN],completed:['#f3f4f6',GR],charged:['#ede9fe','#7c3aed']};

let _id=100;
const uid=()=>'u'+(++_id);
const mkC=(sh,v=0)=>{const o={};sh.forEach(s=>o[s.id]=v);return o;};
const mkRun=(num,cls,job,desc,sh,v=0,notes='')=>({id:uid(),num,counts:[{id:uid(),cls,job,desc,counts:mkC(sh,v),notes}]});
const mkDay=(runs,staff,notes)=>({runs:runs||[],staff:staff||{},notes:notes||''});
const mkBlankWeek=()=>Object.fromEntries(DAYS.map(d=>[d,mkDay()]));

// helpers
const getDT=(job,d)=>{let sh=0,cr=0;(job.week[d]?.runs||[]).forEach(r=>r.counts.forEach(c=>{const v=job.shearers.reduce((s,sh)=>s+Number(c.counts[sh.id]||0),0);if(c.job==='Shearing')sh+=v;else cr+=v;}));return{sh,cr,total:sh+cr};};
const getST=(job)=>{let sh=0,cr=0;DAYS.forEach(d=>{const t=getDT(job,d);sh+=t.sh;cr+=t.cr;});return{sh,cr,total:sh+cr};};
const getShT=(job,sid,dk)=>{const di=DAYS.indexOf(dk);let shBF=0,crBF=0,shD=0,crD=0;DAYS.forEach((d,i)=>{if(i>di)return;let sh=0,cr=0;(job.week[d]?.runs||[]).forEach(r=>r.counts.forEach(c=>{const v=Number(c.counts[sid]||0);if(c.job==='Shearing')sh+=v;else cr+=v;}));if(i<di){shBF+=sh;crBF+=cr;}else{shD=sh;crD=cr;}});return{shearing:{bf:shBF,day:shD,tot:shBF+shD},crutching:{bf:crBF,day:crD,tot:crBF+crD}};};
const getStRuns=(job,stid,dk)=>{const di=DAYS.indexOf(dk);let bf=0,day=0;DAYS.forEach((d,i)=>{if(i>di)return;const v=Number((job.week[d]?.staff||{})[stid]?.runs||0);if(i<di)bf+=v;else day=v;});return{bf,day,tot:bf+day};};
const getStBales=(job,stid,dk)=>{const di=DAYS.indexOf(dk);let bf=0,day=0;DAYS.forEach((d,i)=>{if(i>di)return;const v=Number((job.week[d]?.staff||{})[stid]?.bales||0);if(i<di)bf+=v;else day=v;});return{bf,day,tot:bf+day};};

// initial data
const J1=[{id:'s1',name:'Hayden'},{id:'s2',name:'Gonz'},{id:'s3',name:'Nathan B'},{id:'s4',name:'Nathan'},{id:'s5',name:'LH'}];
const J1S=[{id:'st1',name:'Connor',role:'Wool Handler'},{id:'st2',name:'Ben',role:'Presser'}];
const J2=[{id:'g1',name:'Davo'},{id:'g2',name:'Jacko'},{id:'g3',name:'Bretto'},{id:'g4',name:'Mick'},{id:'g5',name:'Simo'}];
const J2S=[{id:'gst1',name:'Bec',role:'Wool Handler'},{id:'gst2',name:'Tash',role:'Wool Handler'},{id:'gst3',name:'Ray',role:'Classer'},{id:'gst4',name:'Jack',role:'Presser'}];
const J3=[{id:'m1',name:'Kel'},{id:'m2',name:'Thommo'},{id:'m3',name:'Bazza'}];
const J3S=[{id:'mst1',name:'Shaz',role:'Wool Handler'},{id:'mst2',name:'Deb',role:'Penner'}];

const JOBS_INIT=[
  {id:'j1',property:'Mueller',address:'Eyre Peninsula SA',type:'Shearing',status:'active',start:'23/03/2026',
   rates:{shearing:4.80,crutching:1.50},shearers:J1,staff:J1S,travel:Object.fromEntries([...J1,...J1S].map(p=>[p.id,p.role==='Classer'?70:45])),
   week:{monday:mkDay([mkRun(1,'Ewes','Shearing','',J1,55,''),mkRun(2,'Ewes','Shearing','',J1,55,''),mkRun(3,'Lambs','Shearing','',J1,55,''),mkRun(4,'Lambs','Shearing','',J1,55,'')],{st1:{runs:4},st2:{runs:4,bales:17}},'Good day.'),
   tuesday:mkDay(),wednesday:mkDay(),thursday:mkDay(),friday:mkDay(),saturday:mkDay(),sunday:mkDay()}},
  {id:'j2',property:'Gillap Pastoral',address:'South West Victoria',type:'Shearing',status:'active',start:'23/03/2026',
   rates:{shearing:4.10,crutching:1.35},shearers:J2,staff:J2S,travel:Object.fromEntries([...J2,...J2S].map(p=>[p.id,60])),
   week:{monday:mkDay([mkRun(1,'Wethers','Shearing','',J2,70,''),mkRun(2,'Wethers','Shearing','',J2,70,''),mkRun(3,'Ewes','Shearing','',J2,70,''),mkRun(4,'Ewes','Shearing','',J2,70,'')],{gst1:{runs:4},gst2:{runs:4},gst3:{runs:4},gst4:{runs:4,bales:18}},''),
   tuesday:mkDay([mkRun(1,'Ewes','Shearing','',J2,70,''),mkRun(2,'Ewes','Shearing','',J2,70,''),mkRun(3,'Ewes','Shearing','',J2,69,''),mkRun(4,'Ewes','Shearing','',J2,70,'')],{gst1:{runs:4},gst2:{runs:4},gst3:{runs:4},gst4:{runs:4,bales:19}},''),
   wednesday:mkDay(),thursday:mkDay(),friday:mkDay(),saturday:mkDay(),sunday:mkDay()}},
  {id:'j3',property:'McDonalds Farm',address:'Limestone Coast SA',type:'Crutching',status:'active',start:'23/03/2026',
   rates:{shearing:4.80,crutching:1.50},shearers:J3,staff:J3S,travel:Object.fromEntries([...J3,...J3S].map(p=>[p.id,40])),
   week:{monday:mkDay([mkRun(1,'Lambs','Crutching','Lamb FC',J3,120,''),mkRun(2,'Lambs','Crutching','Lamb FC',J3,120,''),mkRun(3,'Lambs','Crutching','Lamb FC',J3,120,''),mkRun(4,'Lambs','Crutching','Lamb FC',J3,120,'')],{mst1:{runs:4},mst2:{runs:4}},'Crutching only.'),
   tuesday:mkDay(),wednesday:mkDay(),thursday:mkDay(),friday:mkDay(),saturday:mkDay(),sunday:mkDay()}},
];

// UI helpers
const d=(...a)=>e('div',...a);
const sp=(...a)=>e('span',...a);
const btn=(...a)=>e('button',...a);
const inp=(...a)=>e('input',...a);
const lbl=(...a)=>e('label',...a);

const card=(children,style={})=>d({style:{background:'#fff',borderRadius:14,border:`1px solid ${BD}`,padding:'16px 18px',...style}},children);
const slab=(text)=>d({style:{fontSize:11,fontWeight:700,color:GR,textTransform:'uppercase',letterSpacing:1.2,marginBottom:10}},text);

function Tag({type}){const[bg,col]=type==='Shearing'?[BLB,BL]:[CRB,CR];return sp({style:{background:bg,color:col,fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:12}},type);}

// ── Add Job Modal ──────────────────────────────────────────
function AddJobModal({onClose,onAdd}){
  const[form,setForm]=useState({property:'',address:'',type:'Shearing',start:'',shearing:'4.80',crutching:'1.50'});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const submit=()=>{
    if(!form.property||!form.start)return;
    const job={id:uid(),property:form.property,address:form.address,type:form.type,status:'active',start:form.start,
      rates:{shearing:Number(form.shearing),crutching:Number(form.crutching)},
      shearers:[],staff:[],travel:{},week:mkBlankWeek()};
    onAdd(job);onClose();
  };
  return d({style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}},
    d({style:{background:'#fff',borderRadius:16,padding:24,width:'100%',maxWidth:440}},
      d({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
        d({style:{fontWeight:800,fontSize:18}},'New Job'),
        btn({onClick:onClose,style:{fontSize:22,color:GR}},'×')
      ),
      ...[['Property name','property','text'],['Address','address','text'],['Start date','start','date']].map(([label,key,type])=>
        d({key,style:{marginBottom:12}},
          lbl({style:{fontSize:13,fontWeight:600,color:GR,display:'block',marginBottom:4}},label),
          inp({type,value:form[key],onChange:ev=>set(key,ev.target.value),style:{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${BD}`,fontSize:14}})
        )
      ),
      d({style:{marginBottom:12}},
        lbl({style:{fontSize:13,fontWeight:600,color:GR,display:'block',marginBottom:4}},'Job type'),
        e('select',{value:form.type,onChange:ev=>set('type',ev.target.value),style:{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${BD}`,fontSize:14}},
          ['Shearing','Crutching','Mixed'].map(t=>e('option',{key:t,value:t},t))
        )
      ),
      d({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}},
        ...['shearing','crutching'].map(k=>
          d({key:k},
            lbl({style:{fontSize:13,fontWeight:600,color:GR,display:'block',marginBottom:4}},k.charAt(0).toUpperCase()+k.slice(1)+' $/head'),
            inp({type:'number',step:0.05,value:form[k],onChange:ev=>set(k,ev.target.value),style:{width:'100%',padding:'10px',borderRadius:8,border:`1px solid ${BD}`,fontSize:14}})
          )
        )
      ),
      d({style:{display:'flex',gap:8}},
        btn({onClick:onClose,style:{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${BD}`,fontSize:14,fontWeight:600,color:GR}},'Cancel'),
        btn({onClick:submit,style:{flex:1,padding:'12px',borderRadius:10,background:N,color:'#fff',fontSize:14,fontWeight:700,border:'none'}},'Create Job')
      )
    )
  );
}

// ── Add Crew Modal ─────────────────────────────────────────
function AddCrewModal({type,onClose,onAdd}){
  const[name,setName]=useState('');
  const[role,setRole]=useState('Wool Handler');
  const[travel,setTravel]=useState('0');
  const submit=()=>{
    if(!name)return;
    const id=uid();
    onAdd({id,name,role:type==='staff'?role:undefined},Number(travel));
    onClose();
  };
  return d({style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}},
    d({style:{background:'#fff',borderRadius:16,padding:24,width:'100%',maxWidth:360}},
      d({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
        d({style:{fontWeight:800,fontSize:18}},type==='shearer'?'Add Shearer':'Add Staff'),
        btn({onClick:onClose,style:{fontSize:22,color:GR}},'×')
      ),
      d({style:{marginBottom:12}},
        lbl({style:{fontSize:13,fontWeight:600,color:GR,display:'block',marginBottom:4}},'Name'),
        inp({type:'text',value:name,onChange:ev=>setName(ev.target.value),placeholder:'Full name',style:{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${BD}`,fontSize:14}})
      ),
      type==='staff'&&d({style:{marginBottom:12}},
        lbl({style:{fontSize:13,fontWeight:600,color:GR,display:'block',marginBottom:4}},'Role'),
        e('select',{value:role,onChange:ev=>setRole(ev.target.value),style:{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${BD}`,fontSize:14}},
          ROLES.map(r=>e('option',{key:r,value:r},r))
        )
      ),
      d({style:{marginBottom:20}},
        lbl({style:{fontSize:13,fontWeight:600,color:GR,display:'block',marginBottom:4}},'Travel allowance ($)'),
        inp({type:'number',value:travel,onChange:ev=>setTravel(ev.target.value),style:{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${BD}`,fontSize:14}})
      ),
      d({style:{display:'flex',gap:8}},
        btn({onClick:onClose,style:{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${BD}`,fontSize:14,fontWeight:600,color:GR}},'Cancel'),
        btn({onClick:submit,style:{flex:1,padding:'12px',borderRadius:10,background:N,color:'#fff',fontSize:14,fontWeight:700,border:'none'}},'Add')
      )
    )
  );
}

// ── Count Row ──────────────────────────────────────────────
function CountRow({count,shearers,onChange,onDelete}){
  const mob=shearers.reduce((s,sh)=>s+Number(count.counts[sh.id]||0),0);
  return d({style:{background:'#f9fafb',borderRadius:10,padding:12,marginBottom:8,border:`1px solid ${BD}`}},
    d({style:{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}},
      e(Tag,{type:count.job}),
      e('select',{value:count.cls,onChange:ev=>onChange({...count,cls:ev.target.value}),style:{padding:'4px 8px',borderRadius:6,border:`1px solid ${BD}`,fontSize:13,fontWeight:600,background:'#fff'}},
        CLS.map(c=>e('option',{key:c,value:c},c))),
      inp({value:count.desc||'',onChange:ev=>onChange({...count,desc:ev.target.value}),
        placeholder:count.job==='Crutching'?'e.g. Lamb FC':'Mob notes (e.g. Red tag ewes)',
        style:{flex:1,minWidth:130,padding:'4px 8px',borderRadius:6,border:`1px solid ${BD}`,fontSize:13}}),
      btn({onClick:onDelete,style:{color:RD,fontSize:20,fontWeight:700,flexShrink:0}},'×')
    ),
    d({className:'hs'},
      e('table',{style:{borderCollapse:'collapse'}},
        e('thead',null,e('tr',null,
          ...shearers.map(sh=>e('th',{key:sh.id,style:{padding:'4px 8px',textAlign:'center',fontSize:11,fontWeight:700,color:GR,whiteSpace:'nowrap',minWidth:68}},sh.name)),
          e('th',{style:{padding:'4px 12px',textAlign:'center',fontSize:11,fontWeight:700,color:N,borderLeft:`2px solid ${BD}`,minWidth:90,whiteSpace:'nowrap'}},'MOB TOTAL')
        )),
        e('tbody',null,e('tr',null,
          ...shearers.map(sh=>e('td',{key:sh.id,style:{padding:'4px 6px',textAlign:'center'}},
            inp({type:'number',min:0,value:count.counts[sh.id]||'',
              onChange:ev=>onChange({...count,counts:{...count.counts,[sh.id]:Number(ev.target.value)||0}}),
              style:{width:58,padding:'8px 4px',borderRadius:8,border:`1px solid ${BD}`,fontSize:18,textAlign:'center',fontWeight:700,background:'#fff'}})
          )),
          e('td',{style:{padding:'4px 10px',textAlign:'center',borderLeft:`2px solid ${BD}`}},
            d({style:{background:N,borderRadius:8,padding:'8px 10px',display:'inline-block',minWidth:60,textAlign:'center'}},
              sp({style:{color:'#fff',fontSize:18,fontWeight:800}},mob))
          )
        ))
      )
    )
  );
}

// ── Run Card ───────────────────────────────────────────────
function RunCard({run,shearers,onUpdate,onDelete}){
  const[open,setOpen]=useState(true);
  const runTotal=run.counts.reduce((s,c)=>s+shearers.reduce((ss,sh)=>ss+Number(c.counts[sh.id]||0),0),0);
  const addC=job=>{const nc={id:uid(),cls:'Ewes',job,desc:'',counts:mkC(shearers,0),notes:''};onUpdate({...run,counts:[...run.counts,nc]});};
  return d({style:{background:'#fff',borderRadius:12,border:`1px solid ${BD}`,marginBottom:12,overflow:'hidden'}},
    d({style:{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:N,cursor:'pointer'},onClick:()=>setOpen(o=>!o)},
      d({style:{width:28,height:28,borderRadius:8,background:AM,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:14,color:'#fff',flexShrink:0}},run.num),
      sp({style:{color:'#fff',fontWeight:700,fontSize:15}},'Run '+run.num),
      sp({style:{color:'#93c5fd',fontSize:12}},run.counts.length+' count'+(run.counts.length!==1?'s':'')),
      d({style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}},
        sp({style:{background:'rgba(255,255,255,0.15)',color:'#fff',fontSize:13,fontWeight:700,padding:'3px 10px',borderRadius:20}},'Run total: '+runTotal),
        btn({onClick:ev=>{ev.stopPropagation();onDelete();},style:{color:'rgba(255,255,255,0.4)',fontSize:20,fontWeight:700}},'×')
      )
    ),
    open&&d({style:{padding:14}},
      ...run.counts.map(c=>e(CountRow,{key:c.id,count:c,shearers,
        onChange:u=>onUpdate({...run,counts:run.counts.map(x=>x.id===c.id?u:x)}),
        onDelete:()=>onUpdate({...run,counts:run.counts.filter(x=>x.id!==c.id)})})),
      d({style:{display:'flex',gap:8,marginTop:6}},
        btn({onClick:()=>addC('Shearing'),style:{flex:1,padding:'8px 0',borderRadius:8,border:`1px dashed ${BL}`,fontSize:13,fontWeight:600,color:BL,background:BLB}},'+ Shearing'),
        btn({onClick:()=>addC('Crutching'),style:{flex:1,padding:'8px 0',borderRadius:8,border:`1px dashed ${CR}`,fontSize:13,fontWeight:600,color:CR,background:CRB}},'+ Crutching')
      )
    )
  );
}

// ── Shearer Totals ─────────────────────────────────────────
function ShearerTotals({job,dayKey}){
  return card(
    d(null,
      slab('Shearer totals'),
      d({className:'hs'},
        e('table',{style:{borderCollapse:'collapse',fontSize:13}},
          e('thead',null,e('tr',{style:{background:'#f9fafb'}},
            e('th',{style:{padding:'8px 12px',textAlign:'left',fontWeight:700,color:GR,borderBottom:`1px solid ${BD}`,whiteSpace:'nowrap'}},'Name'),
            ...['SH BF','SH Day','SH Tot','CR BF','CR Day','CR Tot'].map(h=>
              e('th',{key:h,style:{padding:'8px 14px',textAlign:'center',fontWeight:600,color:GR,borderBottom:`1px solid ${BD}`,fontSize:11,whiteSpace:'nowrap',minWidth:62}},h)
            )
          )),
          e('tbody',null,...job.shearers.map((s,i)=>{
            const t=getShT(job,s.id,dayKey),has=t.shearing.tot>0||t.crutching.tot>0;
            return e('tr',{key:s.id,style:{background:i%2===0?'#fff':'#fafafa',opacity:has?1:0.3}},
              e('td',{style:{padding:'10px 12px',fontWeight:700,whiteSpace:'nowrap'}},s.name),
              e('td',{style:{padding:'10px 14px',textAlign:'center',color:GR}},t.shearing.bf||'—'),
              e('td',{style:{padding:'10px 14px',textAlign:'center',fontWeight:700,color:BL}},t.shearing.day||'—'),
              e('td',{style:{padding:'10px 14px',textAlign:'center',fontWeight:800,color:N,fontSize:15}},t.shearing.tot||'—'),
              e('td',{style:{padding:'10px 14px',textAlign:'center',color:GR}},t.crutching.bf||'—'),
              e('td',{style:{padding:'10px 14px',textAlign:'center',fontWeight:700,color:CR}},t.crutching.day||'—'),
              e('td',{style:{padding:'10px 14px',textAlign:'center',fontWeight:800,color:N,fontSize:15}},t.crutching.tot||'—')
            );
          }))
        )
      ),
      d({style:{fontSize:11,color:'#ccc',marginTop:8}},'SH=Shearing · CR=Crutching · BF=Brought Fwd · Tot=To Date')
    ),
    {marginBottom:12}
  );
}

// ── Shed Staff ─────────────────────────────────────────────
function ShedStaff({job,dayKey,updateJob,showAddStaff}){
  const dd=job.week[dayKey];
  const upd=(stid,field,val)=>updateJob({...job,week:{...job.week,[dayKey]:{...dd,staff:{...dd.staff,[stid]:{...dd.staff[stid],[field]:Number(val)||0}}}}});
  const removeStaff=stid=>updateJob({...job,staff:job.staff.filter(s=>s.id!==stid)});

  const byRole={};
  job.staff.forEach(st=>{if(!byRole[st.role])byRole[st.role]=[];byRole[st.role].push(st);});

  return card(
    d(null,
      d({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        slab('Shed staff'),
        btn({onClick:showAddStaff,style:{fontSize:12,fontWeight:700,color:BL,background:BLB,padding:'4px 10px',borderRadius:6}},'+ Add staff')
      ),
      ...Object.entries(byRole).map(([role,members])=>
        d({key:role},
          d({style:{fontSize:11,fontWeight:700,color:AM,textTransform:'uppercase',letterSpacing:1,marginBottom:6,marginTop:8}},role),
          ...members.map(st=>{
            const runs=getStRuns(job,st.id,dayKey);
            const bales=role==='Presser'?getStBales(job,st.id,dayKey):null;
            const dayEntry=dd.staff[st.id]||{};
            return d({key:st.id,style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',padding:'8px 0',borderBottom:`1px solid #f3f4f6`}},
              d({style:{width:32,height:32,borderRadius:'50%',background:N,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:13,flexShrink:0}},st.name[0]),
              d({style:{flex:1,minWidth:70}},
                d({style:{fontWeight:700,fontSize:13}},st.name)
              ),
              d({style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
                d({style:{display:'flex',alignItems:'center',gap:4}},
                  sp({style:{fontSize:11,color:GR}},'Runs:'),
                  inp({type:'number',min:0,max:20,value:dayEntry.runs||'',onChange:ev=>upd(st.id,'runs',ev.target.value),
                    style:{width:46,padding:'5px 6px',borderRadius:7,border:`1px solid ${BD}`,fontSize:15,textAlign:'center',fontWeight:700}})
                ),
                bales!==null&&d({style:{display:'flex',alignItems:'center',gap:4}},
                  sp({style:{fontSize:11,color:GR}},'Bales:'),
                  inp({type:'number',min:0,value:dayEntry.bales||'',onChange:ev=>upd(st.id,'bales',ev.target.value),
                    style:{width:46,padding:'5px 6px',borderRadius:7,border:`1px solid ${BD}`,fontSize:15,textAlign:'center',fontWeight:700}})
                )
              ),
              d({className:'hs',style:{maxWidth:'100%'}},
                e('table',{style:{borderCollapse:'collapse',fontSize:11}},
                  e('thead',null,e('tr',null,

// ── Job View ───────────────────────────────────────────────
function JobView({job,updateJob,onBack,admin}){

  const addRun=()=>{
    const num=(dd.runs.length||0)+1;if(num>10)return;
    const nr={id:uid(),num,counts:[{id:uid(),cls:'Ewes',job:'Shearing',desc:'',counts:mkC(job.shearers,0),notes:''}]};
    updateJob({...job,week:{...job.week,[day]:{...dd,runs:[...dd.runs,nr]}}});
  };

  const dt=useMemo(()=>{let sh=0,cr=0;dd.runs.forEach(r=>r.counts.forEach(c=>{const v=job.shearers.reduce((s,sh)=>s+Number(c.counts[sh.id]||0),0);if(c.job==='Shearing')sh+=v;else cr+=v;}));return{sh,cr};},[dd]);
  const st=getST(job);

  const addShearer=(person,travel)=>{
    updateJob({...job,shearers:[...job.shearers,person],travel:{...job.travel,[person.id]:travel}});
  };

  const addStaff=(person,travel)=>{
    updateJob({...job,staff:[...job.staff,person],travel:{...job.travel,[person.id]:travel}});

    const idx=STATUS_OPTS.indexOf(job.status);

  const handleCSV=()=>{
    const rows=[['Name','Role','Shearing','Crutching','Travel']];
    job.shearers.forEach(s=>{let sh=0,cr=0;DAYS.forEach(dy=>{(job.week[dy]?.runs||[]).forEach(r=>r.counts.forEach(c=>{const v=Number(c.counts[s.id]||0);if(c.job==='Shearing')sh+=v;else cr+=v;}));});rows.push([s.name,'Shearer',sh,cr,job.travel[s.id]||0]);});

// ── Home Screen ────────────────────────────────────────────
function HomeScreen({jobs,onSelect,onAdd}){
  const[search,setSearch]=useState('');
  const[filterStatus,setFilterStatus]=useState('all');
  const[sort,setSort]=useState('name-asc');
  const[showAdd,setShowAdd]=useState(false);

  const filtered=useMemo(()=>{
    let list=jobs.filter(j=>{
      const matchS=!search||j.property.toLowerCase().includes(search.toLowerCase())||j.address.toLowerCase().includes(search.toLowerCase());
      const matchF=filterStatus==='all'||j.status===filterStatus;
      return matchS&&matchF;
    });
    list=[...list].sort((a,b)=>{
      if(sort==='name-asc')return a.property.localeCompare(b.property);
      if(sort==='name-desc')return b.property.localeCompare(a.property);
      if(sort==='date-asc')return a.start.localeCompare(b.start);
      if(sort==='date-desc')return b.start.localeCompare(a.start);
      return 0;
    });
    return list;
  },[jobs,search,filterStatus,sort]);

  const todayAll=jobs.reduce((s,j)=>s+getDT(j,'monday').total,0);
  const shAll=jobs.reduce((s,j)=>s+getST(j).sh,0);
  const crAll=jobs.reduce((s,j)=>s+getST(j).cr,0);

  return d(null,
    showAdd&&e(AddJobModal,{onClose:()=>setShowAdd(false),onAdd}),
    d({style:{background:`linear-gradient(135deg,${ND},${N})`,borderRadius:16,padding:'20px',marginBottom:16,color:'#fff'}},
      d({style:{color:AM,fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:4}},'WOOLAWAY SHEARING CO.'),
      d({style:{color:'#93c5fd',fontSize:14,marginBottom:16}},'Lachlan Holmes — '+jobs.filter(j=>j.status==='active').length+' active jobs'),
      d({style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}},
        d({style:{background:'rgba(255,255,255,0.08)',borderRadius:10,padding:'10px 12px'}},
          d({style:{fontSize:10,color:'#93c5fd',marginBottom:3}},'TODAY ALL SHEDS'),
          d({style:{fontSize:24,fontWeight:800,color:'#fff'}},todayAll.toLocaleString())
        ),
        d({style:{background:'rgba(255,255,255,0.08)',borderRadius:10,padding:'10px 12px'}},
          d({style:{fontSize:10,color:'#93c5fd',marginBottom:3}},'TOTAL SHEARING'),
          d({style:{fontSize:24,fontWeight:800,color:AM}},shAll.toLocaleString())
        ),
        d({style:{background:'rgba(255,255,255,0.08)',borderRadius:10,padding:'10px 12px'}},
          d({style:{fontSize:10,color:'#93c5fd',marginBottom:3}},'TOTAL CRUTCHING'),
          d({style:{fontSize:24,fontWeight:800,color:CRB}},crAll.toLocaleString())
        )
      )
    ),
    d({style:{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}},
      inp({value:search,onChange:ev=>setSearch(ev.target.value),placeholder:'Search by property or address...',
        style:{flex:1,minWidth:160,padding:'9px 12px',borderRadius:10,border:`1px solid ${BD}`,fontSize:13,background:'#fff'}}),
      e('select',{value:filterStatus,onChange:ev=>setFilterStatus(ev.target.value),style:{padding:'9px 10px',borderRadius:10,border:`1px solid ${BD}`,fontSize:13,background:'#fff'}},
        e('option',{value:'all'},'All status'),
        ...STATUS_OPTS.map(s=>e('option',{key:s,value:s},STATUS_LABELS[s]))
      ),
      e('select',{value:sort,onChange:ev=>setSort(ev.target.value),style:{padding:'9px 10px',borderRadius:10,border:`1px solid ${BD}`,fontSize:13,background:'#fff'}},
        e('option',{value:'name-asc'},'Name A→Z'),
        e('option',{value:'name-desc'},'Name Z→A'),
        e('option',{value:'date-asc'},'Date oldest'),
        e('option',{value:'date-desc'},'Date newest')
      ),
      btn({onClick:()=>setShowAdd(true),style:{padding:'9px 16px',borderRadius:10,background:AM,color:'#fff',fontSize:13,fontWeight:700,whiteSpace:'nowrap'}},'+ New Job')
    ),
    d({style:{fontSize:11,fontWeight:700,color:GR,textTransform:'uppercase',letterSpacing:1.2,marginBottom:10}},filtered.length+' job'+(filtered.length!==1?'s':'')),
    ...filtered.map(j=>{

      const[sc,scol]=STATUS_COLORS[j.status];
      return d({key:j.id,onClick:()=>onSelect(j.id),style:{background:'#fff',borderRadius:14,border:`1px solid ${BD}`,marginBottom:12,overflow:'hidden',cursor:'pointer'},
        onMouseEnter:ev=>ev.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,0.1)',
        onMouseLeave:ev=>ev.currentTarget.style.boxShadow='none'},
        d({style:{padding:'14px 16px',borderBottom:`1px solid #f3f4f6`}},
          d({style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            d(null,
              d({style:{display:'flex',alignItems:'center',gap:6,marginBottom:6,flexWrap:'wrap'}},
                sp({style:{background:sc,color:scol,fontSize:11,fontWeight:700,padding:'2px 10px',borderRadius:20}},STATUS_LABELS[j.status]),
                sp({style:{background:tbg,color:tc,fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:12}},j.type)
              ),
              d({style:{fontWeight:800,fontSize:17,color:N,marginBottom:2}},j.property),
              d({style:{fontSize:12,color:GR}},j.address+' — from '+j.start)
            ),
            d({style:{textAlign:'right',flexShrink:0}},

              d({style:{fontSize:22,fontWeight:800,color:BL}},dayT.total)

        ),
        d({style:{padding:'10px 16px',display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}},
          ...[ ['Shearers',j.shearers.length],['Staff',j.staff.length],['Shorn',shedT.sh],['Crutched',shedT.cr||'—'],['Days',DAYS.filter(dy=>(j.week[dy]?.runs||[]).length>0).length] ].map(([l,v])=>
            d({key:l,style:{textAlign:'center'}},
              d({style:{fontSize:10,color:GR,marginBottom:2}},l),
              d({style:{fontSize:15,fontWeight:700,color:N}},v)
            )
          )
        ),
        d({style:{padding:'0 16px 10px',textAlign:'right'}},
          sp({style:{fontSize:13,fontWeight:700,color:BL}},'Open job →')
        )
      );
    })
  );
}

          d(null,
            d({style:{color:'#fff',fontWeight:800,fontSize:16}},'iGang'),
            d({style:{color:'#93c5fd',fontSize:10,fontWeight:600}},'Woolaway Shearing Co.')
          )
        ),
        btn({onClick:()=>{if(admin)setAdmin(false);else{setShowPin(true);setPinErr(false);setPin('');}},
          style:{padding:'6px 12px',borderRadius:8,fontSize:12,fontWeight:700,background:admin?GNB:'transparent',color:admin?GN:'#93c5fd'}},
          admin?'Admin ON':'Admin')
      )
    ),
    showPin&&d({style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}},
      d({style:{background:'#fff',borderRadius:16,padding:28,width:'100%',maxWidth:320,textAlign:'center'}},
        d({style:{fontSize:32,marginBottom:12}},'🔒'),
        d({style:{fontWeight:700,fontSize:18,marginBottom:6}},'Admin Access'),
        d({style:{fontSize:13,color:GR,marginBottom:20}},'Enter contractor PIN'),
        inp({type:'password',value:pin,onChange:ev=>{setPin(ev.target.value);setPinErr(false);},onKeyDown:ev=>{if(ev.key==='Enter')tryUnlock();},placeholder:'PIN',
          style:{width:'100%',padding:'12px',borderRadius:10,border:`1px solid ${pinErr?RD:BD}`,fontSize:22,textAlign:'center',marginBottom:8,letterSpacing:6}}),
        pinErr&&d({style:{color:RD,fontSize:13,marginBottom:8}},'Incorrect PIN'),
        d({style:{display:'flex',gap:8,marginTop:8}},
          btn({onClick:()=>setShowPin(false),style:{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${BD}`,fontSize:14,fontWeight:600,color:GR}},'Cancel'),
          btn({onClick:tryUnlock,style:{flex:1,padding:'12px',borderRadius:10,background:N,color:'#fff',fontSize:14,fontWeight:700,border:'none'}},'Unlock')
        ),
        d({style:{fontSize:11,color:'#ccc',marginTop:12}},'Demo PIN: 1234')
      )
    ),
    d({style:{maxWidth:720,margin:'0 auto',padding:'16px 12px 40px'}},
      selJob
        ?e(JobView,{job:selJob,updateJob:updJob,onBack:()=>setSelId(null),admin})
        :e(HomeScreen,{jobs,onSelect:setSelId,onAdd:addJob})
    ),
    d({style:{background:'rgba(255,255,255,0.9)',borderTop:`1px solid ${BD}`,padding:'8px 16px',textAlign:'center'}},
      d({style:{fontSize:11,color:'#d1d5db'}},'iGang · Powered by Southern Reach Digital · southernreachdigital.com.au')
    )
  );
}

createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
